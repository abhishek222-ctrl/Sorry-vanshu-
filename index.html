<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Sorry Vanshika ❤️</title>

<style>
body{
margin:0;
height:100vh;
display:flex;
justify-content:center;
align-items:center;ackground:linear-gradient(135deg,#ff9a9e,#fad0c4);
font-family:Arial;
overflow:hidden;
}

.box{
background:white;
padding:40px;
border-radius:20px;
text-align:center;
width:70%;
box-shadow:0 10px 30px rgba(0,0,0,0.2);
}

h1{
color:#ff4d6d;
font-size:40px;
}

typing{
font-size:20px;
white-space:nowrap;
overflow:hidden;
border-right:3px solid;
width:0;
animation:typing 6s steps(60,end) forwards, blink .8s infinite;
}

@keyframes typing{
from{width:0}
to{width:100%}
}

@keyframes blink{
50%{border-color:transparent}
}

button{
margin-top:20px;
padding:12px 25px;
font-size:18px;
border:none;
border-radius:25px;
background:#ff4d6d;
color:white;
cursor:pointer;
transition:.3s;
}

button:hover{
background:#ff1e4d;
transform:scale(1.05);
}

/* Floating hearts */

.heart{
position:absolute;
color:#ff4d6d;
font-size:24px;
animation:float 6s linear infinite;
}

@keyframes float{
0%{
transform:translateY(100vh);
opacidy:1;
}
100%{
transform:translateY(-10vh);
opacidy:0;
}
}
</style>
</head>

<body>

<div class="box">
<h1>I'm Sorry Vanshika ❤️</h1>

<p class="typing">
I never wanted to hurt you. You mean a lot to me.
Please forgive me.
</p>

<button onclick="alert('Thank you for forgiving me ❤️')">
Forgive Me?
</button>
</div>

<script>
function createHeart(){
const heart=document.createElement("div");
heart.className="heart";
heart.innerHTML="❤️";
heart.style.left=Math.random()*100+"vw";
heart.style.fontSize=(20+Math.random()*30)+"px";
document.body.appendChild(heart);

setTimeout(()=>{
heart.remove();
},6000);
}

setInterval(createHeart,500);
</script>

</body>
</html>
